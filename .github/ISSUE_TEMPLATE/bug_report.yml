name: Bug report
description: Report a reproducible problem with Additional Context Menus.
title: '[Bug]: '
labels: ['bug', 'needs triage']
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Additional Context Menus. Please include enough detail for us to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: The Copy Function command fails when...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps to reproduce the problem.
      placeholder: |
        1. Open a TypeScript file in a Node.js project
        2. Right-click inside a function
        3. Select Additional Context Menus > Copy Function
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include errors from the Additional Context Menus output channel when available.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Context menu visibility
        - Copy or move code
        - Copy file contents
        - Save all
        - Open in terminal
        - Generators
        - Accessibility
        - Other
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: 2.1.0
    validations:
      required: true
  - type: input
    id: vscode-version
    attributes:
      label: VS Code version
      placeholder: 1.110.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, sample code, settings, logs, or related issues.
