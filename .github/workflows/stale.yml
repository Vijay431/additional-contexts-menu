name: Stale Issues and PRs

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and Close Stale Threads
    runs-on: ubuntu-latest
    steps:
      - name: Run Stale Automation
        uses: actions/stale@v10
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,good first issue,help wanted
          exempt-pr-labels: pinned,security
          stale-issue-message: This issue has been marked stale because it has had no activity for 60 days. It will close in 14 days if no further activity occurs.
          stale-pr-message: This pull request has been marked stale because it has had no activity for 60 days. It will close in 14 days if no further activity occurs.
          close-issue-message: Closing this stale issue. Please reopen or file a new issue if it is still relevant.
          close-pr-message: Closing this stale pull request. Please reopen when it is ready for review again.
