name: CI

on:
  push:
    tags:
      - 'v*'
    branches:
      - '**'
  pull_request:
  schedule:
    - cron: '0 2 * * 1' # Weekly on Monday at 2:00 AM UTC

permissions:
  contents: write
  pages: write
  id-token: write
  security-events: write
  actions: read
  pull-requests: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Run ESLint
        run: pnpm run lint

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ['18.x', '20.x', '22.x', '24.x']
        vscode-version: ['stable', 'insiders']
      fail-fast: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build Extension
        run: pnpm run build
        env:
          VSCODE_VERSION: ${{ matrix.vscode-version }}

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Run Security Audit
        run: pnpm audit --audit-level=high

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:typescript'

  setup:
    name: Setup Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Extract Version and Tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Prepare Extension for Publishing
        run: pnpm run vscode:prepublish

      - name: Package Extension
        run: pnpm run package

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-package
          path: '*.vsix'

  verifier:
    name: VSIX Verifier
    runs-on: ubuntu-latest
    needs: release-build
    steps:
      - name: Download VSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Verify VSIX Contents
        shell: bash
        run: |
          VSIX_FILE=$(ls *.vsix | head -n 1)
          echo "Verifying: ${VSIX_FILE}"

          # Unzip VSIX to a temp directory
          UNZIP_DIR=$(mktemp -d)
          unzip -q "${VSIX_FILE}" -d "${UNZIP_DIR}"

          # 1. Assert no .ts source files (excluding .d.ts)
          TS_FILES=$(find "${UNZIP_DIR}" -name "*.ts" ! -name "*.d.ts" 2>/dev/null)
          if [ -n "${TS_FILES}" ]; then
            echo "ERROR: VSIX contains TypeScript source files:"
            echo "${TS_FILES}"
            exit 1
          fi
          echo "✓ No .ts source files found"

          # 2. Assert no node_modules directory
          if find "${UNZIP_DIR}" -type d -name "node_modules" | grep -q .; then
            echo "ERROR: VSIX contains node_modules directory"
            exit 1
          fi
          echo "✓ No node_modules directory found"

          # 3. Assert no test files
          TEST_FILES=$(find "${UNZIP_DIR}" -type f \( -name "*.test.js" -o -name "*.spec.js" -o -name "*.test.ts" -o -name "*.spec.ts" \) 2>/dev/null)
          if [ -n "${TEST_FILES}" ]; then
            echo "ERROR: VSIX contains test files:"
            echo "${TEST_FILES}"
            exit 1
          fi
          echo "✓ No test files found"

          # 4. Assert dist/extension.js is present
          if [ ! -f "${UNZIP_DIR}/extension/dist/extension.js" ]; then
            echo "ERROR: dist/extension.js is missing from VSIX"
            exit 1
          fi
          echo "✓ dist/extension.js is present"

          # 5. Check bundle size warning (>100 KB) and fail if >512000 bytes
          BUNDLE_SIZE=$(stat -c%s "${UNZIP_DIR}/extension/dist/extension.js" 2>/dev/null || stat -f%z "${UNZIP_DIR}/extension/dist/extension.js")
          if [ "${BUNDLE_SIZE}" -gt 102400 ]; then
            echo "WARNING: dist/extension.js bundle size is ${BUNDLE_SIZE} bytes (>100 KB)"
          fi

          VSIX_SIZE=$(stat -c%s "${VSIX_FILE}" 2>/dev/null || stat -f%z "${VSIX_FILE}")
          if [ "${VSIX_SIZE}" -gt 512000 ]; then
            echo "ERROR: VSIX total size ${VSIX_SIZE} bytes exceeds 512000 bytes limit"
            exit 1
          fi
          echo "✓ VSIX size is ${VSIX_SIZE} bytes (within limit)"

          # 6 & 7. Validate manifest fields for VS Code Marketplace and Open VSX
          MANIFEST="${UNZIP_DIR}/extension/package.json"
          if [ ! -f "${MANIFEST}" ]; then
            echo "ERROR: extension/package.json not found in VSIX"
            exit 1
          fi

          check_field() {
            local field="$1"
            local value
            value=$(python3 -c "
          import json, sys
          data = json.load(open('${MANIFEST}'))
          keys = '${field}'.split('.')
          val = data
          for k in keys:
              val = val.get(k, None)
              if val is None:
                  break
          print(val if val is not None else '')
          " 2>/dev/null)
            if [ -z "${value}" ]; then
              echo "ERROR: Required manifest field '${field}' is missing or empty"
              exit 1
            fi
            echo "✓ Manifest field '${field}' = ${value}"
          }

          # VS Code Marketplace required fields
          check_field "name"
          check_field "publisher"
          check_field "version"
          check_field "engines.vscode"

          # Open VSX required fields
          check_field "repository"
          check_field "license"

          echo "All VSIX verification checks passed."

  publish-vscode:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest
    needs: verifier
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Download VSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Publish to VS Code Marketplace
        run: pnpm vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-openvsx:
    name: Publish to Open VSX Registry
    runs-on: ubuntu-latest
    needs: verifier
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Download VSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Publish to Open VSX Registry
        run: pnpm ovsx publish *.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: verifier
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: docs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll Site
        run: bundle exec jekyll build
        working-directory: docs

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [setup, verifier]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download VSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.tag }}
          files: '*.vsix'
          generate_release_notes: true
