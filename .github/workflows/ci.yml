name: CI

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - '**'

permissions:
  pages: write
  id-token: write
  pull-requests: read

jobs:
  # ─── Step 1: Quality Gates ────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Run ESLint
        run: pnpm run lint

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ['20.x', '22.x', '24.x']
        vscode-version: ['stable', 'insiders']
      fail-fast: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build Extension
        run: pnpm run build
        env:
          VSCODE_VERSION: ${{ matrix.vscode-version }}

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Run Security Audit
        run: pnpm audit --audit-level=high

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    needs: [audit]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  # ─── Step 3: Setup Release (tag push only) ────────────────────────────────
  setup:
    name: Setup Release
    runs-on: ubuntu-latest
    needs: [lint, build, audit]
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      needs.lint.result == 'success' &&
      needs.build.result == 'success' &&
      needs.audit.result == 'success'
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version and Tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if echo "$VERSION" | grep -qE '\-(rc|next|beta|alpha)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  # ─── Step 4: Release Build ────────────────────────────────────────────────
  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.tag }}

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Prepare Extension for Publishing
        run: pnpm run vscode:prepublish

      - name: Package Extension
        run: pnpm run package

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-package
          path: '*.vsix'

  # ─── Step 5: VSIX Verifier ────────────────────────────────────────────────
  verifier:
    name: VSIX Verifier
    runs-on: ubuntu-latest
    needs: [release-build]
    steps:
      - name: Download VSIX Artifact
        uses: actions/download-artifact@v8
        with:
          name: vsix-package

      - name: Verify VSIX Contents
        shell: bash
        run: |
          VSIX_FILE=$(ls *.vsix | head -n 1)
          echo "Verifying: ${VSIX_FILE}"

          # Unzip VSIX to a temp directory
          UNZIP_DIR=$(mktemp -d)
          unzip -q "${VSIX_FILE}" -d "${UNZIP_DIR}"

          # 1. Assert no .ts source files (excluding .d.ts)
          TS_FILES=$(find "${UNZIP_DIR}" -name "*.ts" ! -name "*.d.ts" 2>/dev/null)
          if [ -n "${TS_FILES}" ]; then
            echo "ERROR: VSIX contains TypeScript source files:"
            echo "${TS_FILES}"
            exit 1
          fi
          echo "✓ No .ts source files found"

          # 2. Assert no node_modules directory
          if find "${UNZIP_DIR}" -type d -name "node_modules" | grep -q .; then
            echo "ERROR: VSIX contains node_modules directory"
            exit 1
          fi
          echo "✓ No node_modules directory found"

          # 3. Assert no test files
          TEST_FILES=$(find "${UNZIP_DIR}" -type f \( -name "*.test.js" -o -name "*.spec.js" -o -name "*.test.ts" -o -name "*.spec.ts" \) 2>/dev/null)
          if [ -n "${TEST_FILES}" ]; then
            echo "ERROR: VSIX contains test files:"
            echo "${TEST_FILES}"
            exit 1
          fi
          echo "✓ No test files found"

          # 4. Assert dist/extension.js is present
          if [ ! -f "${UNZIP_DIR}/extension/dist/extension.js" ]; then
            echo "ERROR: dist/extension.js is missing from VSIX"
            exit 1
          fi
          echo "✓ dist/extension.js is present"

          # 5. Validate manifest fields for VS Code Marketplace and Open VSX
          MANIFEST="${UNZIP_DIR}/extension/package.json"
          if [ ! -f "${MANIFEST}" ]; then
            echo "ERROR: extension/package.json not found in VSIX"
            exit 1
          fi

          check_field() {
            local field="$1"
            local value
            value=$(python3 -c "
          import json, sys
          data = json.load(open('${MANIFEST}'))
          keys = '${field}'.split('.')
          val = data
          for k in keys:
              val = val.get(k, None)
              if val is None:
                  break
          print(val if val is not None else '')
          " 2>/dev/null)
            if [ -z "${value}" ]; then
              echo "ERROR: Required manifest field '${field}' is missing or empty"
              exit 1
            fi
            echo "✓ Manifest field '${field}' = ${value}"
          }

          # VS Code Marketplace required fields
          check_field "name"
          check_field "publisher"
          check_field "version"
          check_field "engines.vscode"

          # Open VSX required fields
          check_field "repository"
          check_field "license"

          echo "All VSIX verification checks passed."

  # ─── Step 6: Publish (parallel) ───────────────────────────────────────────
  publish-vscode:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest
    needs: [setup, verifier]
    steps:
      - name: Download VSIX Artifact
        uses: actions/download-artifact@v8
        with:
          name: vsix-package

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Publish to VS Code Marketplace
        run: |
          if [ "${{ needs.setup.outputs.is_prerelease }}" = "true" ]; then
            pnpm dlx vsce publish --packagePath *.vsix --pre-release
          else
            pnpm dlx vsce publish --packagePath *.vsix
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-openvsx:
    name: Publish to Open VSX Registry
    runs-on: ubuntu-latest
    needs: [setup, verifier]
    steps:
      - name: Download VSIX Artifact
        uses: actions/download-artifact@v8
        with:
          name: vsix-package

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Publish to Open VSX Registry
        run: |
          if [ "${{ needs.setup.outputs.is_prerelease }}" = "true" ]; then
            pnpm dlx ovsx publish *.vsix --pre-release
          else
            pnpm dlx ovsx publish *.vsix
          fi
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

  # ─── Step 7: Deploy GitHub Pages (stable releases only) ───────────────────
  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: [setup, publish-vscode, publish-openvsx]
    if: needs.setup.outputs.is_prerelease == 'false'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll Site
        run: bundle exec jekyll build
        working-directory: site

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
