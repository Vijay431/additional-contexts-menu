name: CI

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - '**'
  schedule:
    - cron: '0 2 * * 1' # Weekly on Monday at 2:00 AM UTC

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: read

jobs:
  # ─── Step 1: Quality Gates ────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Run ESLint
        run: pnpm run lint

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ['20.x', '22.x', '24.x']
        vscode-version: ['stable', 'insiders']
      fail-fast: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build Extension
        run: pnpm run build
        env:
          VSCODE_VERSION: ${{ matrix.vscode-version }}

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Run Security Audit
        run: pnpm audit --audit-level=high

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    needs: [audit]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  # ─── Step 3: Setup Release (tag push only) ────────────────────────────────
  setup:
    name: Setup Release
    runs-on: ubuntu-latest
    needs: [lint, build, audit]
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      needs.lint.result == 'success' &&
      needs.build.result == 'success' &&
      needs.audit.result == 'success'
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Extract Version and Tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if echo "$VERSION" | grep -qE '\-(rc|next|beta|alpha)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  # ─── Step 4: Release Build ────────────────────────────────────────────────
  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.tag }}

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Prepare Extension for Publishing
        run: pnpm run vscode:prepublish

      - name: Package Extension
        run: pnpm run package

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-package
          path: '*.vsix'

  # ─── Step 5: VSIX Verifier ────────────────────────────────────────────────
  verifier:
    name: VSIX Verifier
    runs-on: ubuntu-latest
    needs: [release-build]
    steps:
      - name: Download VSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Verify VSIX Contents
        shell: bash
        run: |
          VSIX_FILE=$(ls *.vsix | head -n 1)
          echo "Verifying: ${VSIX_FILE}"

          # Unzip VSIX to a temp directory
          UNZIP_DIR=$(mktemp -d)
          unzip -q "${VSIX_FILE}" -d "${UNZIP_DIR}"

          # Check bundle size warning (>100 KB) and fail if >512000 bytes
          BUNDLE_SIZE=$(stat -c%s "${UNZIP_DIR}/extension/dist/extension.js" 2>/dev/null || stat -f%z "${UNZIP_DIR}/extension/dist/extension.js")
          if [ "${BUNDLE_SIZE}" -gt 102400 ]; then
            echo "WARNING: dist/extension.js bundle size is ${BUNDLE_SIZE} bytes (>100 KB)"
          fi

          VSIX_SIZE=$(stat -c%s "${VSIX_FILE}" 2>/dev/null || stat -f%z "${VSIX_FILE}")
          if [ "${VSIX_SIZE}" -gt 512000 ]; then
            echo "ERROR: VSIX total size ${VSIX_SIZE} bytes exceeds 512000 bytes limit"
            exit 1
          fi
          echo "✓ VSIX size is ${VSIX_SIZE} bytes (within limit)"

  # ─── Step 6: Publish (parallel) ───────────────────────────────────────────
  publish-vscode:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest
    needs: [setup, verifier]
    steps:
      - name: Download VSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Publish to VS Code Marketplace
        run: |
          if [ "${{ needs.setup.outputs.is_prerelease }}" = "true" ]; then
            pnpm dlx vsce publish --packagePath *.vsix --pre-release
          else
            pnpm dlx vsce publish --packagePath *.vsix
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-openvsx:
    name: Publish to Open VSX Registry
    runs-on: ubuntu-latest
    needs: [setup, verifier]
    steps:
      - name: Download VSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Publish to Open VSX Registry
        run: |
          if [ "${{ needs.setup.outputs.is_prerelease }}" = "true" ]; then
            pnpm dlx ovsx publish *.vsix --pre-release
          else
            pnpm dlx ovsx publish *.vsix
          fi
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

  # ─── Step 7: Deploy GitHub Pages (stable releases only) ───────────────────
  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: [setup, publish-vscode, publish-openvsx]
    if: needs.setup.outputs.is_prerelease == 'false'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll Site
        run: bundle exec jekyll build
        working-directory: site

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─── Step 8: Create GitHub Release ────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [setup, publish-vscode, publish-openvsx, deploy-pages]
    if: |
      always() &&
      needs.setup.result == 'success' &&
      needs.publish-vscode.result == 'success' &&
      needs.publish-openvsx.result == 'success' &&
      (
        needs.deploy-pages.result == 'success' ||
        (needs.setup.outputs.is_prerelease == 'true' && needs.deploy-pages.result == 'skipped')
      )
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Generate Changelog
        run: node scripts/generate-changelog.js ${{ needs.setup.outputs.tag }}

      - name: Commit Changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore(release): update CHANGELOG for ${{ needs.setup.outputs.tag }}"
          git push origin main

      - name: Download VSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.tag }}
          files: '*.vsix'
          generate_release_notes: true
          prerelease: ${{ needs.setup.outputs.is_prerelease == 'true' }}
