name: Release & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Extract Version from Tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build Extension (Production)
        run: pnpm run vscode:prepublish

      - name: Package VSIX
        run: pnpm run package

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-package
          path: '*.vsix'
          retention-days: 7

  verifier:
    name: Verify VSIX
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download VSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Unpack and Verify VSIX Contents
        run: |
          VSIX_FILE=$(ls *.vsix | head -1)
          echo "Verifying: $VSIX_FILE"

          # VSIX files are ZIP archives
          unzip -o "$VSIX_FILE" -d vsix-contents

          echo "=== VSIX Contents ==="
          find vsix-contents -type f | sort

          # Assert no source files are present
          if find vsix-contents -type f -name "*.ts" | grep -v ".d.ts" | grep -q .; then
            echo "ERROR: TypeScript source files found in VSIX"
            exit 1
          fi

          # Assert no node_modules are present
          if find vsix-contents -type d -name "node_modules" | grep -q .; then
            echo "ERROR: node_modules directory found in VSIX"
            exit 1
          fi

          # Assert no test files are present
          if find vsix-contents -type f -path "*/test/*" | grep -q .; then
            echo "ERROR: Test files found in VSIX"
            exit 1
          fi

          # Assert no scripts directory is present
          if find vsix-contents -type d -name "scripts" | grep -q .; then
            echo "ERROR: scripts directory found in VSIX"
            exit 1
          fi

          # Assert dist/extension.js is present
          if ! find vsix-contents -name "extension.js" | grep -q .; then
            echo "ERROR: dist/extension.js not found in VSIX"
            exit 1
          fi

          # Check bundle size (main bundle should be <= 100 KB)
          BUNDLE_SIZE=$(find vsix-contents -name "extension.js" -exec wc -c {} \; | awk '{print $1}')
          echo "Bundle size: $BUNDLE_SIZE bytes"
          if [ "$BUNDLE_SIZE" -gt 102400 ]; then
            echo "WARNING: Main bundle exceeds 100 KB target ($BUNDLE_SIZE bytes)"
          fi

          # Check total VSIX size (<= 500 KB)
          VSIX_SIZE=$(wc -c < "$VSIX_FILE")
          echo "VSIX size: $VSIX_SIZE bytes"
          if [ "$VSIX_SIZE" -gt 512000 ]; then
            echo "ERROR: VSIX exceeds 500 KB limit ($VSIX_SIZE bytes)"
            exit 1
          fi

          echo "VSIX verification passed"

  publish-vscode:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest
    needs: verifier
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Download VSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Publish to VS Code Marketplace
        run: pnpm vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-openvsx:
    name: Publish to Open VSX Registry
    runs-on: ubuntu-latest
    needs: verifier
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Download VSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Publish to Open VSX Registry
        run: pnpm ovsx publish *.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: verifier
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: ./docs

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install Jekyll Dependencies
        run: |
          cd docs
          bundle install

      - name: Build Jekyll Site
        run: |
          cd docs
          bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
