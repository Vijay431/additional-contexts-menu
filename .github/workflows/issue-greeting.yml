name: Issue Greeting

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  greeting:
    name: Welcome New Issues
    runs-on: ubuntu-latest

    steps:
      - name: Determine Issue Type
        id: issue-type
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          ISSUE_TYPE="General Issue"

          if echo "$ISSUE_TITLE" | grep -qE '\[BUG\]|\[PLATFORM\]|\[TERMINAL\]|\[CONFIG\]|\[TEST\]'; then
            ISSUE_TYPE="Bug Report"
          elif echo "$ISSUE_TITLE" | grep -qE '\[FEATURE\]|\[FRAMEWORK\]|\[CONTEXT-MENU\]'; then
            ISSUE_TYPE="Feature Request"
          elif echo "$ISSUE_TITLE" | grep -q '\[DOCS\]'; then
            ISSUE_TYPE="Documentation"
          elif echo "$ISSUE_TITLE" | grep -q '\[PERF\]'; then
            ISSUE_TYPE="Performance"
          elif echo "$ISSUE_TITLE" | grep -q '\[SECURITY\]'; then
            ISSUE_TYPE="Security"
          elif echo "$ISSUE_TITLE" | grep -q '\[REFACTOR\]'; then
            ISSUE_TYPE="Refactoring"
          fi

          echo "type=$ISSUE_TYPE" >> $GITHUB_OUTPUT

      - name: Generate Comment
        id: comment
        run: |
          ISSUE_TYPE="${{ steps.issue-type.outputs.type }}"

          BASE_COMMENT="## 👋 Welcome to Additional Context Menus!

          Thanks for opening an issue. We appreciate your contribution!

          ### 📋 Issue Detected: $ISSUE_TYPE

          ### 📚 Helpful Resources

          - [Official Documentation](https://vijaygangatharan.github.io/additional-contexts-menu/)
          - [GitHub Wiki](https://github.com/Vijay431/additional-contexts-menu/wiki)
          - [Contributing Guidelines](https://github.com/Vijay431/additional-contexts-menu/blob/main/CONTRIBUTING.md)
          - [Troubleshooting Guide](https://vijaygangatharan.github.io/additional-contexts-menu/troubleshooting.html)
          - [Frequently Asked Questions](https://vijaygangatharan.github.io/additional-contexts-menu/faq.html)"

          ISSUE_SPECIFIC_LINKS=""

          case "$ISSUE_TYPE" in
            "Bug Report")
              ISSUE_SPECIFIC_LINKS="
          ### 🔍 Bug Report Resources

          - [Troubleshooting Common Issues](https://vijaygangatharan.github.io/additional-contexts-menu/troubleshooting.html)
          - [Check Existing Bug Reports](https://github.com/Vijay431/additional-contexts-menu/issues?q=is%3Aissue+is%3Aopen+label%3Abug)
          - [Debug Guide](https://vijaygangatharan.github.io/additional-contexts-menu/debugging.html)"
              ;;

            "Feature Request")
              ISSUE_SPECIFIC_LINKS="
          ### 💡 Feature Request Resources

          - [Feature Guidelines](https://github.com/Vijay431/additional-contexts-menu/blob/main/CONTRIBUTING.md#types-of-contributions)
          - [Existing Feature Requests](https://github.com/Vijay431/additional-contexts-menu/issues?q=is%3Aissue+is%3Aopen+label%3Aenhancement)
          - [Roadmap](https://github.com/Vijay431/additional-contexts-menu/projects)"
              ;;

            "Documentation")
              ISSUE_SPECIFIC_LINKS="
          ### 📖 Documentation Resources

          - [Documentation Contribution Guide](https://github.com/Vijay431/additional-contexts-menu/blob/main/CONTRIBUTING.md#documentation)
          - [Service Documentation](https://vijaygangatharan.github.io/additional-contexts-menu/services/)
          - [API Reference](https://vijaygangatharan.github.io/additional-contexts-menu/api.html)"
              ;;

            "Performance")
              ISSUE_SPECIFIC_LINKS="
          ### ⚡ Performance Resources

          - [Performance Guidelines](https://vijaygangatharan.github.io/additional-contexts-menu/performance.html)
          - [Performance Issues](https://github.com/Vijay431/additional-contexts-menu/issues?q=is%3Aissue+is%3Aopen+label%3Aperformance)
          - [Benchmarks](https://vijaygangatharan.github.io/additional-contexts-menu/benchmarks.html)"
              ;;

            "Security")
              ISSUE_SPECIFIC_LINKS="
          ### 🔒 Security Resources

          - [Security Policy](https://github.com/Vijay431/additional-contexts-menu/security/policy)
          - [Security Best Practices](https://vijaygangatharan.github.io/additional-contexts-menu/security.html)
          - [Security Issues](https://github.com/Vijay431/additional-contexts-menu/issues?q=is%3Aissue+is%3Aopen+label%3Asecurity)

          **⚠️ For CRITICAL or HIGH severity vulnerabilities, please email vijayanand431@gmail.com directly instead of using GitHub issues.**"
              ;;

            "Refactoring")
              ISSUE_SPECIFIC_LINKS="
          ### 🛠️ Refactoring Resources

          - [Code Quality Guidelines](https://github.com/Vijay431/additional-contexts-menu/blob/main/CONTRIBUTING.md#code-quality-standards)
          - [Architecture Overview](https://vijaygangatharan.github.io/additional-contexts-menu/architecture.html)
          - [Refactoring Issues](https://github.com/Vijay431/additional-contexts-menu/issues?q=is%3Aissue+is%3Aopen+label%3Arefactoring)"
              ;;

            *)
              ISSUE_SPECIFIC_LINKS="
          ### 📋 General Resources

          - [GitHub Discussions](https://github.com/Vijay431/additional-contexts-menu/discussions)
          - [Existing Issues](https://github.com/Vijay431/additional-contexts-menu/issues)
          - [How to Contribute](https://github.com/Vijay431/additional-contexts-menu/blob/main/CONTRIBUTING.md)"
              ;;
          esac

          FINAL_COMMENT="$BASE_COMMENT

          $ISSUE_SPECIFIC_LINKS

          ### 🔍 Quick Checks

          - [ ] Check for [existing issues](https://github.com/Vijay431/additional-contexts-menu/issues)
          - [ ] Review [template requirements](https://github.com/Vijay431/additional-contexts-menu/issues/new/choose)
          - [ ] Include [environment details](https://github.com/Vijay431/additional-contexts-menu/blob/main/CONTRIBUTING.md#environment-setup)

          ### ⏱️ Response Time

          Our team typically responds within 48 hours.

          **For security vulnerabilities:** Email vijayanand431@gmail.com directly.

          Thanks again! 🙏"

          echo "$FINAL_COMMENT" > comment.txt

      - name: Post Comment
        run: |
          COMMENT_BODY=$(cat comment.txt)

          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "$COMMENT_BODY"
        env:
          GH_TOKEN: ${{ github.token }}
