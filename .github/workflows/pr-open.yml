name: Open PR to Main

on:
  push:
    branches:
      - '**'
      - '!main'
    tags-ignore:
      - 'v*'

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    name: Open PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create PR if not exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if gh pr view "$BRANCH" --json state -q .state 2>/dev/null | grep -q .; then
            echo "PR already exists for branch '$BRANCH', skipping."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --fill
          fi
