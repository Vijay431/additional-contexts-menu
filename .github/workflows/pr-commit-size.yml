name: PR Commit Size

on:
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  pull-requests: write

jobs:
  commit-size:
    name: Commit Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR Size
        id: check
        shell: bash
        run: |
          MAX_FILES=15
          MAX_LINES=600
          STATS=$(git diff --numstat origin/${{ github.base_ref }}...HEAD)
          FILE_COUNT=$(echo "$STATS" | grep -c .)
          LINE_COUNT=$(echo "$STATS" | awk '{sum += $1 + $2} END {print sum+0}')
          FAILED=0
          [ "$FILE_COUNT" -gt "$MAX_FILES" ] && FAILED=1
          [ "$LINE_COUNT" -gt "$MAX_LINES" ] && FAILED=1
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "file_count=${FILE_COUNT}" >> "$GITHUB_OUTPUT"
          echo "line_count=${LINE_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Post or Update PR Comment
        if: steps.check.outputs.failed == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="## ⚠️ PR Too Large

          This PR exceeds the recommended size limits. Consider splitting it into smaller PRs.
          "
          [ "${{ steps.check.outputs.file_count }}" -gt 15 ] && BODY="${BODY}
          - Too many files changed: **${{ steps.check.outputs.file_count }}** (max 15)"
          [ "${{ steps.check.outputs.line_count }}" -gt 600 ] && BODY="${BODY}
          - Too many lines changed: **${{ steps.check.outputs.line_count }}** (max 600)"

          gh pr comment ${{ github.event.pull_request.number }} --edit-last --body "$BODY" 2>/dev/null || \
          gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"

      - name: Fail if PR Too Large
        if: steps.check.outputs.failed == '1'
        run: exit 1
