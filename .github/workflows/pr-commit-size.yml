name: PR Commit Size

on:
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  pull-requests: write

jobs:
  commit-size:
    name: Commit Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR Size
        id: check
        shell: bash
        run: |
          MAX_FILES=10
          MAX_LINES=400
          STATS=$(git diff --numstat origin/${{ github.base_ref }}...HEAD)
          # Build exclusion pattern from scripts/commit-size-excludes.txt (skip blank lines and # comments)
          EXCLUDES_FILE="scripts/commit-size-excludes.txt"
          if [ -f "$EXCLUDES_FILE" ]; then
            PATTERN=$(grep -v -E '^\s*(#|$)' "$EXCLUDES_FILE" | paste -sd '|' -)
            if [ -n "$PATTERN" ]; then
              FILTERED=$(echo "$STATS" | grep -v -E "$PATTERN" || true)
            else
              FILTERED="$STATS"
            fi
          else
            FILTERED="$STATS"
          fi
          FILE_COUNT=$(echo "$FILTERED" | grep -c . 2>/dev/null || echo 0)
          LINE_COUNT=$(echo "$FILTERED" | awk '{sum += $1 + $2} END {print sum+0}')
          FAILED=0
          [ "$FILE_COUNT" -gt "$MAX_FILES" ] && FAILED=1
          [ "$LINE_COUNT" -gt "$MAX_LINES" ] && FAILED=1
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "file_count=${FILE_COUNT}" >> "$GITHUB_OUTPUT"
          echo "line_count=${LINE_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Post or Update PR Comment
        if: steps.check.outputs.failed == '1'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-size
          message: |
            ## ⚠️ PR Too Large

            This PR exceeds the recommended size limits. Consider splitting it into smaller PRs.
            ${{ steps.check.outputs.file_count > 10 && format('- Too many files changed: **{0}** (max 10)', steps.check.outputs.file_count) || '' }}
            ${{ steps.check.outputs.line_count > 400 && format('- Too many lines changed: **{0}** (max 400)', steps.check.outputs.line_count) || '' }}

      - name: Fail if PR Too Large
        if: >-
          steps.check.outputs.failed == '1' &&
          !contains(github.event.pull_request.labels.*.name, 'size/override')
        run: exit 1
