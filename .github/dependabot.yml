version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'UTC'
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - 'dependencies'
      - 'context-menus'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    reviewers:
      - 'Vijay431'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'tuesday'
      time: '06:00'
      timezone: 'UTC'
    labels:
      - 'github-actions'
      - 'dependencies'
    reviewers:
      - 'Vijay431'
