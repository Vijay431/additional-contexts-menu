# Jekyll Configuration for Additional Context Menus GitHub Pages

# Site settings
title: 'Additional Context Menus - VS Code Extension'
email: vijayanand431@gmail.com
description: >-
  Extract functions, generate enums/env/cron, refactor React components, and automate Node.js development
  with intelligent right-click context menus. Supports React, Angular, Express, Next.js, TypeScript, and JavaScript.

baseurl: '/additional-contexts-menu' # the subpath of your site, e.g. /blog
url: 'https://vijay431.github.io' # the base hostname & protocol for your site

# Author
author:
  name: 'Vijay Gangatharan'
  email: 'vijayanand431@gmail.com'
  github: 'Vijay431'

# Repository
repository: 'Vijay431/additional-contexts-menu'
github_username: Vijay431

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - package.json
  - package-lock.json
  - webpack.config.js
  - tsconfig.json
  - .eslintrc.js
  - .gitignore
  - .vscode/
  - src/
  - dist/
  - coverage/
  - out/

# Site navigation
navigation:
  - title: 'Home'
    url: '/'
  - title: 'Features'
    url: '/features'
  - title: 'Code Operations'
    url: '/code-operations'
  - title: 'Installation'
    url: '/installation'
  - title: 'Documentation'
    url: '/documentation'
  - title: 'Developer Guide'
    url: '/developer'
  - title: 'Download'
    url: '/download'

# Extension details
extension:
  name: 'Additional Context Menus'
  version: '2.0.0'
  marketplace_url: 'https://marketplace.visualstudio.com/items?itemName=VijayGangatharan.additional-context-menus'
  github_url: 'https://github.com/Vijay431/additional-contexts-menu'
  publisher: 'VijayGangatharan'
  test_coverage: '53 e2e tests'
  success_rate: '100%'
  bundle_size: '60KB'
  lazy_services: '26KB'
  build_time: '~1 second'

# SEO and social
twitter:
  username:
  card: summary_large_image

social:
  name: 'Vijay Gangatharan'
  links:
    - 'https://github.com/Vijay431'

# SEO keywords
seo:
  keywords: 'vscode extension, refactoring tool, code generation, react tools, typescript tools, nodejs development, extract function, context menu, developer productivity'
  og_title: 'Additional Context Menus - Smart Code Operations for VS Code'
  og_description: 'Automate Node.js development with intelligent context menus. Extract functions, generate code, and refactor React components in one click.'

# Analytics (uncomment and add your tracking ID)
# google_analytics: UA-XXXXXXXXX-X

# Default layouts
defaults:
  - scope:
      path: ''
      type: 'pages'
    values:
      layout: 'default'

# Sass configuration
sass:
  sass_dir: assets/css
  style: compressed
